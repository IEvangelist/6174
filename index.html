<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="%BASE_URL%favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="A theme-aware, shareable single-page app that animates Kaprekar's routine and reveals why valid 4-digit seeds fall into 6174 and valid 3-digit seeds fall into 495."
    />
    <meta name="theme-color" content="#09090f" />
    <meta property="og:title" content="6174 / 495 - Kaprekar Explorer" />
    <meta
      property="og:description"
      content="Explore Kaprekar's routine, switch between 6174 and 495, and share beautifully animated number journeys."
    />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://ievangelist.github.io/6174/" />
    <meta
      property="og:image"
      content="https://ievangelist.github.io/6174/og-image.svg"
    />
    <meta
      property="og:image:alt"
      content="Kaprekar Explorer artwork featuring the 6174 and 495 constants."
    />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="6174 / 495 - Kaprekar Explorer" />
    <meta
      name="twitter:description"
      content="Explore Kaprekar's routine, switch between 6174 and 495, and share beautifully animated number journeys."
    />
    <meta
      name="twitter:image"
      content="https://ievangelist.github.io/6174/og-image.svg"
    />
    <script>
      ;(() => {
        const storageKey = '6174-theme'
        const storedTheme = window.localStorage.getItem(storageKey)
        const systemTheme = window.matchMedia('(prefers-color-scheme: dark)').matches
          ? 'dark'
          : 'light'
        document.documentElement.dataset.theme =
          storedTheme === 'light' || storedTheme === 'dark' ? storedTheme : systemTheme
      })()
    </script>
    <title>6174 / 495 - Kaprekar Explorer</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
