<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="%BASE_URL%favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="A theme-aware, shareable single-page app that animates Kaprekar's routine and reveals why every valid 4-digit seed falls into 6174."
    />
    <meta name="theme-color" content="#09090f" />
    <script>
      ;(() => {
        const storageKey = '6174-theme'
        const storedTheme = window.localStorage.getItem(storageKey)
        const systemTheme = window.matchMedia('(prefers-color-scheme: dark)').matches
          ? 'dark'
          : 'light'
        document.documentElement.dataset.theme =
          storedTheme === 'light' || storedTheme === 'dark' ? storedTheme : systemTheme
      })()
    </script>
    <title>6174 - Kaprekar Constant Explorer</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
